name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      major_minor: ${{ steps.meta.outputs.major_minor }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
    steps:
      - id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Unsupported release tag format: $TAG"
            echo "Expected vMAJOR.MINOR or vMAJOR.MINOR.PATCH"
            exit 1
          fi

          VERSION="${TAG#v}"
          PARTS="${VERSION//./ }"
          set -- $PARTS
          MAJOR="$1"
          MINOR="$2"
          MAJOR_MINOR="${MAJOR}.${MINOR}"

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "major_minor=$MAJOR_MINOR"
            echo "checkout_ref=refs/tags/$TAG"
          } >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: ["386", amd64, arm64]
        exclude:
          - goarch: "386"
            goos: darwin
          - goarch: arm64
            goos: windows
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o zdns-rest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/zdns-rest

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: zdns-rest-${{ matrix.goos }}-${{ matrix.goarch }}
          path: zdns-rest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          if-no-files-found: error

      - name: Print SHA256
        run: sha256sum zdns-rest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    strategy:
      matrix:
        include:
          - goarch: amd64
            platform: linux/amd64
          - goarch: arm64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker tags
        id: docker-tags
        shell: bash
        run: |
          TAGS=(
            "ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag }}"
            "ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }}"
          )
          if [[ "${{ needs.prepare.outputs.version }}" != "${{ needs.prepare.outputs.major_minor }}" ]]; then
            TAGS+=("ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.major_minor }}")
          fi

          {
            echo 'tags<<EOF'
            printf '%s\n' "${TAGS[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download matching binary artifact
        uses: actions/download-artifact@v4
        with:
          name: zdns-rest-linux-${{ matrix.goarch }}
          path: docker-dist/

      - name: Prepare Docker binary
        shell: bash
        run: |
          set -euo pipefail
          mv docker-dist/zdns-rest-linux-${{ matrix.goarch }} docker-dist/zdns-rest
          chmod +x docker-dist/zdns-rest
          sha256sum docker-dist/zdns-rest | tee docker-dist/sha256.txt

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push architecture image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.release
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag }}-${{ matrix.goarch }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Verify image contains released binary
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="ghcr.io/${{ github.repository }}@${{ steps.build-image.outputs.digest }}"
          docker pull "$IMAGE_REF"
          docker create --name verify-image "$IMAGE_REF" >/dev/null
          docker cp verify-image:/root/zdns-rest docker-dist/zdns-rest-from-image
          docker rm -f verify-image >/dev/null
          sha256sum docker-dist/zdns-rest-from-image
          cmp -s docker-dist/zdns-rest docker-dist/zdns-rest-from-image

      - name: Export image digest
        shell: bash
        run: |
          mkdir -p image-digests
          digest="${{ steps.build-image.outputs.digest }}"
          touch "image-digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: image-digests-${{ matrix.goarch }}
          path: image-digests/*

  docker-manifest:
    name: Publish Docker Manifest
    runs-on: ubuntu-latest
    needs: [prepare, docker]
    steps:
      - name: Compute Docker tags
        id: docker-tags
        shell: bash
        run: |
          TAGS=(
            "ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag }}"
            "ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }}"
          )
          if [[ "${{ needs.prepare.outputs.version }}" != "${{ needs.prepare.outputs.major_minor }}" ]]; then
            TAGS+=("ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.major_minor }}")
          fi

          {
            echo 'tags<<EOF'
            printf '%s\n' "${TAGS[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: image-digests/
          pattern: image-digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        shell: bash
        run: |
          set -euo pipefail
          SOURCES=()
          for digest_file in image-digests/*; do
            digest="$(basename "$digest_file")"
            SOURCES+=("ghcr.io/${{ github.repository }}@sha256:${digest}")
          done

          while IFS= read -r tag; do
            docker buildx imagetools create -t "$tag" "${SOURCES[@]}"
          done <<< "${{ steps.docker-tags.outputs.tags }}"

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: zdns-rest-*

      - name: Display structure
        run: ls -R artifacts/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          for f in artifacts/*/*; do
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber
          done
